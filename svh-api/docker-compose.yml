services:
  app:
    build:
      target: runtime
    volumes:
      - .:/app
      - /app/vendor
      - /app/node_modules
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
    ports:
      - "${APP_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "php artisan serve --host=${APP_HOST:-0.0.0.0} --port=8080"