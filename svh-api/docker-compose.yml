services:
  app:
    build:
      context: .
      target: runtime
      args:
        UID: ${DOCKER_UID:-1000}
        GID: ${DOCKER_GID:-1000}
    volumes:
      - .:/app
      - /app/vendor
    env_file: .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
    ports:
      - "${APP_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: /usr/bin/supervisord -c /etc/supervisor/conf.d/svh.conf