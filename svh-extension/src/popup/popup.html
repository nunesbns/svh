<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVH</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      width: 280px;
      background: #0d1117;
      color: #e6edf3;
      overflow: hidden;
    }

    .popup-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 200px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1f2e 0%, #161b27 100%);
      border-bottom: 1px solid #21262d;
      padding: 16px 18px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      object-fit: contain;
      box-shadow: 0 0 12px rgba(88,166,255,0.2);
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #e6edf3;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .header-text span {
      font-size: 11px;
      color: #7d8590;
      font-weight: 400;
    }

    /* Status */
    .status-section {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #161b27;
    }

    .status-indicator {
      position: relative;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #3fb950;
      box-shadow: 0 0 10px rgba(63,185,80,0.5);
      transition: all 0.3s ease;
    }

    .dot.off {
      background: #f85149;
      box-shadow: 0 0 10px rgba(248,81,73,0.5);
    }

    .dot::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: rgba(63,185,80,0.15);
      animation: pulse 2s infinite;
    }

    .dot.off::after {
      background: rgba(248,81,73,0.15);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0; }
    }

    .status-info {
      flex: 1;
    }

    .status-label {
      font-size: 12px;
      color: #7d8590;
      margin-bottom: 2px;
    }

    #text {
      font-size: 13px;
      font-weight: 600;
      color: #e6edf3;
    }

    /* Badge */
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(63,185,80,0.15);
      color: #3fb950;
      border: 1px solid rgba(63,185,80,0.3);
      transition: all 0.3s ease;
    }

    .badge.inactive {
      background: rgba(248,81,73,0.15);
      color: #f85149;
      border-color: rgba(248,81,73,0.3);
    }

    /* Divider */
    .divider { height: 1px; background: #21262d; margin: 0; }

    /* Footer */
    .footer {
      padding: 12px 18px;
      background: #0d1117;
    }

    .settings-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 9px 16px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .settings-btn:hover {
      background: #30363d;
      border-color: #58a6ff;
      color: #58a6ff;
      transform: translateY(-1px);
    }

    .settings-btn svg {
      width: 14px;
      height: 14px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .settings-btn:hover svg { opacity: 1; }

    /* Version tag */
    .version-row {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .version {
      font-size: 10px;
      color: #484f58;
    }
  </style>
</head>
<body>
  <div class="popup-wrapper">
    <div class="header">
      <img class="logo" id="logo" alt="SVH Logo" />
      <div class="header-text">
        <h1>Scriptcase Versioning Hub</h1>
        <span>Code versioning for the IDE</span>
      </div>
    </div>

    <div class="status-section">
      <div class="status-indicator">
        <div class="dot" id="dot"></div>
      </div>
      <div class="status-info">
        <div class="status-label">Current status</div>
        <div id="text">Checking...</div>
      </div>
      <div class="badge" id="badge">Active</div>
    </div>

    <div class="divider"></div>

    <div class="footer">
      <a class="settings-btn" id="open-options" href="#">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Open Settings
      </a>
      <div class="version-row">
        <span class="version">v1.1.0</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
